<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXTUF SHOP</title>
    <style>
        :root { --accent: #ff5000; --bg: #0e0e0e; --card-bg: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: #111; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; text-align: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .product-img-container { width: 100%; aspect-ratio: 1/1; background: #222; overflow: hidden; }
        .product-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 10px; flex-grow: 1; }
        .product-title { font-size: 0.85rem; color: #ccc; height: 34px; overflow: hidden; margin-bottom: 5px; }
        .price { color: #fff; font-size: 1.1rem; font-weight: bold; }
        .buy-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>
    <header><div style="font-weight: bold; font-size: 1.4rem; color: var(--accent);">DEXTUF SHOP</div></header>
    <div class="container" id="products-container"></div>

    <div id="order-modal">
        <div class="modal-content">
            <h3 id="p-name"></h3>
            <input type="text" id="fio" placeholder="ФИО">
            <input type="text" id="phone" placeholder="Telegram / Телефон">
            <input type="text" id="address" placeholder="Адрес доставки">
            <button class="buy-btn" onclick="sendOrder()">ОФОРМИТЬ</button>
            <button style="background:none; color:#666; border:none; margin-top:10px; width:100%;" onclick="closeOrder()">Отмена</button>
        </div>
    </div>

    <script>
        let selectedProduct = "";
        async function loadProducts() {
            try {
                const res = await fetch('/get-products');
                const products = await res.json();
                const container = document.getElementById('products-container');
                container.innerHTML = '';
                products.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card">
                            <div class="product-img-container"><img src="${p.image}"></div>
                            <div class="product-info">
                                <div class="product-title">${p.title}</div>
                                <div class="price">${p.price}</div>
                                <button class="buy-btn" onclick="openOrder('${p.title}')">КУПИТЬ</button>
                            </div>
                        </div>`;
                });
            } catch (e) { console.log(e); }
        }
        function openOrder(name) { selectedProduct = name; document.getElementById('p-name').innerText = name; document.getElementById('order-modal').style.display = 'flex'; }
        function closeOrder() { document.getElementById('order-modal').style.display = 'none'; }
        async function sendOrder() {
            const data = {
                product: selectedProduct,
                fio: document.getElementById('fio').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            const res = await fetch('/order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert("Заказ отправлен!"); closeOrder(); }
        }
        loadProducts();
    </script>
</body>
</html>
