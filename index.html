<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK SHOP - Лутаем Кэш</title>
    <style>
        body { background-color: #0a0a0a; color: #39FF14; font-family: 'Courier New', monospace; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { border: 2px solid #39FF14; margin: 15px; padding: 15px; width: 250px; box-shadow: 0 0 15px #39FF14; }
        img { width: 100%; border-bottom: 2px solid #39FF14; margin-bottom: 10px; }
        button { background: #1a1a1a; color: #39FF14; border: 1px solid #39FF14; padding: 10px 20px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #39FF14; color: #000; }
        h1 { text-shadow: 2px 2px #ff0000; font-size: 3em; }
    </style>
</head>
<body>
    <h1>D A R K   S H O P</h1>
    <p>Выбирай товар, плати бабки и вали!</p>

    <div class="container">
        <div class="card">
            <h3>Приватный софт</h3>
            <p>Цена: 500$</p>
            <button onclick="buyItem('Приватный софт')">КУПИТЬ НАХУЙ</button>
        </div>
        
        <div class="card">
            <h3>Стилер 2.0</h3>
            <p>Цена: 200$</p>
            <button onclick="buyItem('Стилер 2.0')">ВЗЯТЬ ПО ГНИЛОЙ</button>
        </div>
    </div>

    <script>
        function buyItem(itemName) {
            const phone = prompt("Введите ваш номер телефона/TG для связи:");
            
            if (phone) {
                const formData = new FormData();
                formData.append('item', itemName);
                formData.append('phone', phone);

                fetch('/order', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (response.ok) {
                        alert("Заказ принят! Бот уже шепнул мне о тебе в телегу.");
                    } else {
                        alert("Ошибка сервера. Проверь логи на Render.");
                    }
                })
                .catch(error => alert("Ошибка! Код не долетел до сервера."));
            }
        }
    </script>
</body>
</html>
