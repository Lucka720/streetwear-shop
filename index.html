<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXTUF SHOP</title>
    <style>
        :root { --accent: #ff5000; --bg: #0e0e0e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        header { background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }
        .card-info { padding: 10px; flex-grow: 1; }
        .price { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        .product-title { font-size: 0.85rem; color: #ccc; margin-bottom: 5px; }

        #product-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal-img { width: 100%; max-height: 60vh; object-fit: contain; }
        .modal-details { padding: 20px; background: #0e0e0e; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; }
        .modal-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .modal-desc { color: #aaa; line-height: 1.5; margin-bottom: 25px; white-space: pre-wrap; }
        .buy-now-btn { background: var(--accent); color: #fff; border: none; width: 100%; padding: 18px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; z-index: 2100; }

        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .order-content { background: #1c1c1c; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
        .order-content h2 { margin: 0 0 5px 0; font-size: 1.3rem; }
        .order-content p { color: var(--accent); margin: 0 0 20px 0; font-size: 0.9rem; }
        .order-content input { width: 100%; padding: 15px; margin-bottom: 12px; background: #2a2a2a; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .confirm-btn { background: var(--accent); color: #fff; border: none; width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <header><div style="color:var(--accent); font-weight:bold; font-size:1.5rem; letter-spacing: 2px;">DEXTUF</div></header>
    <div class="container" id="list">Загрузка...</div>

    <div id="product-modal">
        <div class="close-btn" onclick="closeProduct()">✕</div>
        <img id="m-img" class="modal-img">
        <div class="modal-details">
            <div id="m-title" class="modal-title"></div>
            <div id="m-price" class="price" style="font-size: 1.4rem; margin-bottom: 15px;"></div>
            <div id="m-desc" class="modal-desc"></div>
            <button class="buy-now-btn" onclick="showOrderForm()">ВЫБРАТЬ ВАРИАНТ</button>
        </div>
    </div>

    <div id="order-modal">
        <div class="order-content">
            <div style="position:absolute; top:15px; right:15px; cursor:pointer; color:#666;" onclick="closeOrderForm()">✕</div>
            <h2>Оформление заказа</h2>
            <p id="order-product-name"></p>
            <input type="text" id="fio" placeholder="ФИО получателя">
            <input type="text" id="phone" placeholder="Телефон / Telegram">
            <input type="text" id="address" placeholder="Город, адрес, индекс">
            <input type="text" id="email" placeholder="Email (необязательно)">
            <button class="confirm-btn" onclick="sendOrder()">ОПЛАТИТЬ</button>
        </div>
    </div>

    <script>
        let currentItem = null;
        let allProducts = [];
        let userCurrency = 'USD';
        let exchangeRate = 1;
        const backupRates = { "CZK": 23.4, "UAH": 39.2, "EUR": 0.92, "USD": 1 };

        async function init() {
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                if (geoData.country_code === 'CZ') userCurrency = 'CZK';
                else if (geoData.country_code === 'UA') userCurrency = 'UAH';
                else if (['DE', 'FR', 'ES', 'IT', 'SK', 'AT', 'BE'].includes(geoData.country_code)) userCurrency = 'EUR';

                const rateRes = await fetch('https://api.exchangerate-api.v4/latest/USD');
                const rateData = await rateRes.json();
                exchangeRate = rateData.rates[userCurrency] || backupRates[userCurrency] || 1;
            } catch (e) {
                exchangeRate = backupRates[userCurrency] || 1;
            }
            await checkPayment(); // Проверяем оплату при возврате
            loadProducts();
        }

        async function loadProducts() {
            const res = await fetch('/get-products');
            allProducts = await res.json();
            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            allProducts.forEach(p => {
                const val = parseFloat(p.price) || 0;
                const finalPrice = Math.round(val * exchangeRate);
                const data = encodeURIComponent(JSON.stringify(p));
                list.innerHTML += `<div class="card"><img src="${p.image}" onclick="openProduct('${data}')"><div class="card-info"><div class="product-title">${p.title}</div><div class="price">${finalPrice} ${userCurrency}</div></div></div>`;
            });
        }
