<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXTUF SHOP</title>
    <style>
        :root { --accent: #ff5000; --bg: #0e0e0e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        header { background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }
        .card-info { padding: 10px; }
        .price { font-weight: bold; color: var(--accent); }

        /* ОКНО ТОВАРА (как на скрине №2) */
        #product-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; overflow-y: auto; }
        .modal-img { width: 100%; max-height: 70vh; object-fit: contain; background: #000; }
        .modal-details { padding: 20px; }
        .modal-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .modal-desc { color: #aaa; line-height: 1.4; margin-bottom: 20px; }
        .buy-now-btn { background: var(--accent); color: #fff; border: none; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <header><div style="color:var(--accent); font-weight:bold; font-size:1.5rem;">DEXTUF</div></header>
    <div class="container" id="list"></div>

    <div id="product-modal">
        <div class="close-btn" onclick="closeProduct()">✕</div>
        <img id="m-img" class="modal-img">
        <div class="modal-details">
            <div id="m-title" class="modal-title"></div>
            <div id="m-price" class="price" style="font-size: 1.3rem; margin-bottom: 10px;"></div>
            <div id="m-desc" class="modal-desc"></div>
            <button class="buy-now-btn" onclick="openOrder()">ВЫБРАТЬ ВАРИАНТ</button>
        </div>
    </div>

    <script>
        let currentItem = null;

        async function load() {
            const res = await fetch('/get-products');
            const products = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            products.forEach(p => {
                list.innerHTML += `
                    <div class="card">
                        <img src="${p.image}" onclick="openProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                        <div class="card-info">
                            <div style="font-size:0.9rem; margin-bottom:5px;">${p.title}</div>
                            <div class="price">${p.price}</div>
                        </div>
                    </div>`;
            });
        }

        function openProduct(p) {
            currentItem = p;
            document.getElementById('m-img').src = p.image;
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-price').innerText = p.price;
            document.getElementById('m-desc').innerText = p.desc || "Описание отсутствует";
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeProduct() { document.getElementById('product-modal').style.display = 'none'; }
        
        function openOrder() {
            let name = prompt("Введите ваше ФИО и телефон для заказа:");
            if(name) {
                fetch('/order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ product: currentItem.title, fio: name, phone: "через prompt" })
                });
                alert("Заказ принят! Менеджер свяжется с вами.");
            }
        }
        load();
    </script>
</body>
</html>
