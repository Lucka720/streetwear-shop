<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXTUF ADMIN</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        input { width: 100%; max-width: 300px; padding: 10px; margin: 10px 0; display: block; margin-left: auto; margin-right: auto; }
        button { background: #ff5000; color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>АДМИНКА DEXTUF</h1>
    <input type="text" id="emoji" placeholder="Эмодзи (например 👕)">
    <input type="text" id="title" placeholder="Название товара">
    <input type="text" id="price" placeholder="Цена (например 2500₽)">
    <button onclick="addProduct()">ДОБАВИТЬ ТОВАР</button>

    <script>
        async function addProduct() {
            const item = {
                emoji: document.getElementById('emoji').value,
                title: document.getElementById('title').value,
                price: document.getElementById('price').value
            };
            
            if(!item.title || !item.price) return alert("Заполни поля!");

            const res = await fetch('/add-product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(item)
            });

            if(res.ok) {
                alert('Товар добавлен! Проверяй главную.');
                location.reload();
            }
        }
    </script>
</body>
</html>
