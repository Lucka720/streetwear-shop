<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка - Управление товарами</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { background: #ff5000; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .product-item { background: #1a1a1a; padding: 15px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .del-btn { background: #cc0000; width: auto; padding: 8px 15px; }
        h2 { border-bottom: 2px solid #ff5000; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Добавить товар</h2>
    <input type="text" id="title" placeholder="Название товара">
    <input type="number" id="price" placeholder="Цена в USD (только число)">
    <input type="text" id="image" placeholder="Ссылка на фото">
    <textarea id="desc" placeholder="Описание товара" rows="4"></textarea>
    <button onclick="addProduct()">ДОБАВИТЬ НА САЙТ</button>

    <h2 style="margin-top: 40px;">Список товаров (Удаление)</h2>
    <div id="admin-list">Загрузка товаров...</div>

    <script>
        const pass = "Qwerty58763"; // Твой пароль из server.py

        // Загрузка товаров для списка удаления
        async function loadAdminProducts() {
            const res = await fetch('/get-products');
            const products = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            
            products.forEach((p, index) => {
                list.innerHTML += `
                    <div class="product-item">
                        <div>
                            <strong>${p.title}</strong> — ${p.price} USD
                        </div>
                        <button class="del-btn" onclick="deleteProduct(${index})">Удалить</button>
                    </div>`;
            });
            if(products.length === 0) list.innerHTML = "Товаров пока нет.";
        }

        async function addProduct() {
            const data = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').value,
                desc: document.getElementById('desc').value
            };

            if(!data.title || !data.price) return alert("Заполни название и цену!");

            await fetch('/add-product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            alert("Товар добавлен!");
            location.reload();
        }

        async function deleteProduct(index) {
            if(!confirm("Удалить этот товар?")) return;
            
            const enteredPass = prompt("Введите пароль администратора:");
            if(enteredPass !== pass) return alert("Неверный пароль!");

            // Мы добавим этот роут в server.py ниже
            await fetch('/delete-product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ index: index, password: enteredPass })
            });
            
            location.reload();
        }

        loadAdminProducts();
    </script>
</body>
</html>
