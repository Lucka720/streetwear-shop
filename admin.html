<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXTUF ADMIN</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        input, textarea { width: 100%; max-width: 350px; padding: 12px; margin: 10px 0; display: block; margin-left: auto; margin-right: auto; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff5000; color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; width: 100%; max-width: 350px; }
        .loading { display: none; color: #ffae00; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>АДМИНКА DEXTUF</h1>
    <p>Выбери фото из галереи:</p>
    <input type="file" id="fileInput" accept="image/*">
    <input type="text" id="title" placeholder="Название товара">
    <textarea id="desc" placeholder="Описание товара"></textarea>
    <input type="text" id="price" placeholder="Цена (например 2500₽)">
    
    <div id="loader" class="loading">Загружаем фото в облако... подожди...</div>
    <button id="addBtn" onclick="uploadAndAdd()">ОПУБЛИКОВАТЬ</button>

    <script>
        const IMGBB_KEY = "bfa785e76c7201f0ed8aaacf1a92c15c"; 

        async function uploadAndAdd() {
            const fileInput = document.getElementById('fileInput');
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const price = document.getElementById('price').value;
            const btn = document.getElementById('addBtn');
            const loader = document.getElementById('loader');

            if (!fileInput.files[0] || !title) return alert("Выбери фото и введи название!");

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                // 1. Грузим в ImgBB
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                
                const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const imgData = await imgRes.json();
                const directLink = imgData.data.url;

                // 2. Отправляем данные на наш сервер
                const res = await fetch('/add-product', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image: directLink, title, desc, price })
                });

                if(res.ok) {
                    alert('Товар опубликован навсегда!');
                    location.reload();
                }
            } catch (err) {
                alert('Ошибка загрузки! Проверь интернет или API ключ.');
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
